 name: Copilot Setup Steps
 
 on:
   workflow_dispatch:
   push:
     paths:
       - .github/workflows/copilot-setup-steps.yml
   pull_request:
     paths:
       - .github/workflows/copilot-setup-steps.yml
 
 jobs:
   copilot-setup-steps:
     runs-on: ubuntu-latest
     permissions:
       contents: read
     steps:
       - uses: actions/checkout@v5
       - name: Install Moderne CLI
         run: |
           curl https://app.moderne.io/cli | bash
           echo "$HOME/.moderne/cli/bin" >> "$GITHUB_PATH"
       - name: Activate Moderne CLI
         run: |
            mod --version
            mod config moderne edit https://app.moderne.io
            mod config moderne login --with-token ${{ secrets.MODERNE_PLATFORM_PAT }}
            mod config license edit ${{ secrets.MODERNE_LICENSE_KEY_ALTERNATIVE }}
            mod config moderne show
            mod config http trust-store edit file /etc/ssl/certs/adoptium/cacerts
            mod config recipes artifacts maven add https://repo.maven.apache.org/maven2
       - name: Install Agent tools
         run: mod config agent-tools copilot install
       - name: Install recipes
         run:  |
            mod config recipes jar install org.openrewrite.recipe:rewrite-static-analysis:LATEST org.openrewrite.recipe:rewrite-java-security:LATEST
            mod config recipes list | head -20